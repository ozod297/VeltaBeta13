<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e3a5f" />

    <!-- ========== FAVICON ========== -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ========== PRIMARY SEO ========== -->
    <title>Velta</title>
    <meta
      name="description"
      content="Velta — O'zbekistonning yetakchi farmatsevtika kompaniyasi. GMP, ISO 9001, ISO 13485 va WHO-PQ sertifikatlangan sifatli dori-darmonlar. Rasmiy sayt: velta.uz"
    />
    <meta
      name="keywords"
      content="Velta, Velta farmatsevtika, Velta dori, velta.uz, O'zbekiston dori, farmatsevtika kompaniyasi, GMP sertifikat, ISO 9001, paracetamol, ibuprofen, antibiotik, vitamin, dori-darmon"
    />
    <meta name="author" content="Velta Pharmaceutical" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <link rel="canonical" href="https://velta.uz/" />

    <!-- ========== LANGUAGE / REGION ========== -->
    <link rel="alternate" hreflang="uz" href="https://velta.uz/" />
    <link rel="alternate" hreflang="ru" href="https://velta.uz/ru/" />
    <link rel="alternate" hreflang="en" href="https://velta.uz/en/" />
    <link rel="alternate" hreflang="x-default" href="https://velta.uz/" />

    <!-- ========== OPEN GRAPH (Facebook, Telegram) ========== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://velta.uz/" />
    <meta property="og:site_name" content="Velta" />
    <meta
      property="og:title"
      content="Velta — O'zbekiston farmatsevtika kompaniyasi"
    />
    <meta
      property="og:description"
      content="Velta — O'zbekistonning yetakchi farmatsevtika kompaniyasi. GMP, ISO 9001, ISO 13485 va WHO-PQ sertifikatlangan sifatli dori-darmonlar."
    />
    <meta property="og:image" content="https://velta.uz/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Velta farmatsevtika kompaniyasi" />
    <meta property="og:locale" content="uz_UZ" />
    <meta property="og:locale:alternate" content="ru_RU" />

    <!-- ========== TWITTER CARD ========== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Velta — O'zbekiston farmatsevtika kompaniyasi"
    />
    <meta
      name="twitter:description"
      content="O'zbekistonning yetakchi farmatsevtika kompaniyasi. GMP, ISO 9001 sertifikatlangan."
    />
    <meta name="twitter:image" content="https://velta.uz/og-image.jpg" />

    <!-- ========== STRUCTURED DATA (JSON-LD) ========== -->
    <!-- Organization schema — Google brend sifatida taniydi -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Velta",
        "alternateName": ["Вельта", "Velta Pharmaceutical", "Velta Farma"],
        "url": "https://velta.uz",
        "logo": "https://velta.uz/logo.jpg",
        "description": "Velta — O'zbekistonning yetakchi farmatsevtika kompaniyasi. GMP, ISO 9001, ISO 13485 va WHO-PQ sertifikatlangan.",
        "foundingLocation": {
          "@type": "Place",
          "addressCountry": "UZ"
        },
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "UZ",
          "addressLocality": "Toshkent"
        },
        "sameAs": [
          "https://www.facebook.com/velta.uz",
          "https://www.instagram.com/velta.uz",
          "https://t.me/velta_uz"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["Uzbek", "Russian"]
        }
      }
    </script>

    <!-- WebSite schema — Google axtaruvida sayt nomini ko'rsatadi -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Velta",
        "url": "https://velta.uz",
        "description": "Velta farmatsevtika — O'zbekistonning yetakchi dori-darmon ishlab chiqaruvchisi",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://velta.uz/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        },
        "inLanguage": ["uz", "ru"]
      }
    </script>

    <!-- MedicalBusiness schema — tibbiy kompaniya uchun -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MedicalBusiness",
        "name": "Velta",
        "url": "https://velta.uz",
        "image": "https://velta.uz/og-image.jpg",
        "description": "O'zbekistonning yetakchi farmatsevtika kompaniyasi",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "UZ"
        },
        "hasCredential": [
          {
            "@type": "EducationalOccupationalCredential",
            "credentialCategory": "GMP Certificate"
          },
          {
            "@type": "EducationalOccupationalCredential",
            "credentialCategory": "ISO 9001"
          },
          {
            "@type": "EducationalOccupationalCredential",
            "credentialCategory": "ISO 13485"
          },
          {
            "@type": "EducationalOccupationalCredential",
            "credentialCategory": "WHO-PQ"
          }
        ]
      }
    </script>

    <!-- ========== PERFORMANCE ========== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
